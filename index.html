<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yabanın Derinlikleri: Yılanın Yolu</title>
    <style>
        :root {
            --bg-dark: #141c11;
            --ui-bg: rgba(25, 35, 20, 0.92);
            --ui-border: #3d4f35;
            --text-main: #e3ebd9;
            --accent: #5c7a4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-main);
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 16px;
            z-index: 5;
        }

        .interactive { pointer-events: auto !important; }

        .leaderboard {
            background: var(--ui-bg);
            border: 1px solid var(--ui-border);
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            min-width: 180px;
        }

        .leaderboard h3 {
            font-size: 0.9rem;
            border-bottom: 1px solid var(--ui-border);
            padding-bottom: 4px;
            margin-bottom: 6px;
            color: #dfc88b;
            font-weight: 600;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 3px;
        }

        .leaderboard-item.player {
            color: #ff9f43;
            font-weight: bold;
        }

        .stats-hud {
            background: var(--ui-bg);
            border: 1px solid var(--ui-border);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 18, 10, 0.96);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            pointer-events: auto !important;
        }

        .menu-box {
            background: var(--ui-bg);
            border: 2px solid var(--ui-border);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            width: 85%;
            max-width: 360px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            pointer-events: auto !important;
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin-bottom: 6px;
            font-weight: 400;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 20px 0 5px 0;
            background: var(--ui-border);
            border: none;
            color: var(--text-main);
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 500;
            pointer-events: auto !important;
            touch-action: manipulation;
        }

        .btn:hover, .btn:active { background: var(--accent); }

        #joystickContainer {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 110px;
            height: 110px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            display: none;
            touch-action: none;
            z-index: 20;
        }

        #joystickKnob {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            position: absolute;
            top: 33px;
            left: 33px;
        }

        #boostButton {
            position: absolute;
            bottom: 45px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: none;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            touch-action: none;
            z-index: 20;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-overlay">
        <div style="display: flex; justify-content: space-between; width: 100%;">
            <div class="stats-hud">
                <div id="txtScore">Uzunluk: 10</div>
                <div id="txtKills" style="margin-top: 4px; color: #aaa;">Avlanan: 0</div>
            </div>
            <div class="leaderboard">
                <h3>LİDERLER</h3>
                <div id="leaderboardContent"></div>
            </div>
        </div>
    </div>

    <div id="joystickContainer"><div id="joystickKnob"></div></div>
    <div id="boostButton">HIZLAN</div>

    <div id="startMenu" class="screen-overlay">
        <div class="menu-box interactive">
            <h1>YABANIN YOLU</h1>
            <p style="color: #697d5a; font-size: 0.85rem;">Büyük Balık Küçük Balığı Yutar</p>
            <button class="btn" id="btnStart">Avlanmaya Başla</button>
        </div>
    </div>

    <div id="gameOverMenu" class="screen-overlay hidden">
        <div class="menu-box interactive">
            <h1 style="color: #b33939;">Yutuldun!</h1>
            <p id="endStats" style="font-size: 0.9rem; margin-bottom: 15px;"></p>
            <button class="btn" onclick="location.reload()">Yeniden Başla</button>
        </div>
    </div>

    <script>
        const AudioFX = {
            ctx: null,
            init() {
                try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
            },
            playEat() {
                if(!this.ctx) return;
                let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.frequency.setValueAtTime(400, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, this.ctx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.04, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.08);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.08);
            }
        };

        const CONFIG = {
            worldWidth: 2500,
            worldHeight: 2500,
            initialSegments: 15,
            segmentSpacing: 8,
            baseSpeed: 140,
            boostSpeed: 240
        };

        const Game = {
            canvas: null,
            ctx: null,
            running: false,
            lastTime: 0,
            camera: { x: 0, y: 0, zoom: 1 },
            mouse: { x: 0, y: 0 },
            player: null,
            bots: [],
            foods: [],
            touch: { active: false, id: null, sx: 0, sy: 0, mx: 0, my: 0 },
            isBoosting: false,

            init() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.resize();
                window.addEventListener('resize', () => this.resize());

                window.addEventListener('mousemove', (e) => this.onMouseMove(e));
                window.addEventListener('mousedown', () => { this.isBoosting = true; });
                window.addEventListener('mouseup', () => { this.isBoosting = false; });
                window.addEventListener('keydown', (e) => { if(e.key === ' ') this.isBoosting = true; });
                window.addEventListener('keyup', (e) => { if(e.key === ' ') this.isBoosting = false; });

                // Çift Katmanlı Tetikleyici (Hem tıklama hem mobilde dokunma için)
                const startBtn = document.getElementById('btnStart');
                startBtn.addEventListener('click', (e) => { e.preventDefault(); this.start(); });
                startBtn.addEventListener('touchstart', (e) => { e.preventDefault(); this.start(); });

                this.setupMobile();
                this.spawnInitialFoods(350);
                this.spawnBots(15);
            },

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                if ('ontouchstart' in window) {
                    document.getElementById('joystickContainer').style.display = 'block';
                    document.getElementById('boostButton').style.display = 'flex';
                }
            },

            start() {
                if (this.running) return; 
                AudioFX.init();
                document.getElementById('startMenu').classList.add('hidden');
                
                this.player = this.createSnake(CONFIG.worldWidth/2, CONFIG.worldHeight/2, "#4cd137", "Sen", false);
                this.updateUI();
                
                this.running = true;
                this.lastTime = performance.now();
                requestAnimationFrame((t) => this.loop(t));
            },

            createSnake(x, y, color, name, isBot) {
                let segments = [];
                for(let i = 0; i < CONFIG.initialSegments; i++) {
                    segments.push({ x: x, y: y + i * CONFIG.segmentSpacing });
                }
                return {
                    name: name,
                    color: color,
                    isBot: isBot,
                    segments: segments,
                    angle: -Math.PI / 2,
                    targetAngle: -Math.PI / 2,
                    score: CONFIG.initialSegments,
                    kills: 0,
                    dead: false,
                    speed: CONFIG.baseSpeed,
                    thickness: 10,
                    botTargetTimer: 0
                };
            },

            spawnInitialFoods(count) {
                for(let i=0; i<count; i++) {
                    this.foods.push(this.createFood(Math.random()*CONFIG.worldWidth, Math.random()*CONFIG.worldHeight));
                }
            },

            createFood(x, y, size = null) {
                return {
                    x: x,
                    y: y,
                    r: size || (2 + Math.random() * 4),
                    color: `hsl(${Math.random() * 360}, 75%, 65%)`
                };
            },

            spawnBots(count) {
                const colors = ["#e74c3c", "#3498db", "#9b59b6", "#f1c40f", "#e67e22", "#1abc9c"];
                const names = ["KaraMamba", "Porsuk", "Engerek", "Anakonda", "YabanBeyi", "Gezgin", "Gölge", "Zehir"];
                for(let i=0; i<count; i++) {
                    let rX = Math.random() * CONFIG.worldWidth;
                    let rY = Math.random() * CONFIG.worldHeight;
                    let col = colors[Math.floor(Math.random()*colors.length)];
                    let nm = names[Math.floor(Math.random()*names.length)] + " #" + Math.floor(Math.random()*90+10);
                    this.bots.push(this.createSnake(rX, rY, col, nm, true));
                }
            },

            onMouseMove(e) {
                this.mouse.x = e.clientX;
                this.mouse.y = e.clientY;
            },

            setupMobile() {
                const joy = document.getElementById('joystickContainer');
                const knob = document.getElementById('joystickKnob');
                const bst = document.getElementById('boostButton');

                joy.addEventListener('touchstart', (e) => {
                    let t = e.changedTouches[0];
                    this.touch.id = t.identifier;
                    this.touch.sx = t.clientX; this.touch.sy = t.clientY;
                    this.touch.active = true;
                });

                joy.addEventListener('touchmove', (e) => {
                    if(!this.touch.active) return;
                    for(let t of e.changedTouches) {
                        if(t.identifier === this.touch.id) {
                            let dx = t.clientX - this.touch.sx;
                            let dy = t.clientY - this.touch.sy;
                            let dist = Math.sqrt(dx*dx + dy*dy);
                            if(dist > 35) { dx *= 35/dist; dy *= 35/dist; }
                            knob.style.transform = `translate(${dx}px, ${dy}px)`;
                            this.touch.mx = dx / 35; this.touch.my = dy / 35;
                        }
                    }
                });

                joy.addEventListener('touchend', () => {
                    this.touch.active = false;
                    knob.style.transform = 'translate(0px, 0px)';
                    this.touch.mx = 0; this.touch.my = 0;
                });

                bst.addEventListener('touchstart', (e) => { e.preventDefault(); this.isBoosting = true; });
                bst.addEventListener('touchend', () => { this.isBoosting = false; });
            },

            loop(timestamp) {
                if(!this.running) return;
                let dt = (timestamp - this.lastTime) / 1000;
                if(dt > 0.1) dt = 0.1;
                this.lastTime = timestamp;

                this.update(dt);
                this.render();

                requestAnimationFrame((t) => this.loop(t));
            },

            update(dt) {
                if(!this.player || this.player.dead) return;

                if(this.touch.active) {
                    this.player.targetAngle = Math.atan2(this.touch.my, this.touch.mx);
                } else {
                    let worldMouseX = this.mouse.x + this.camera.x - this.canvas.width/2;
                    let worldMouseY = this.mouse.y + this.camera.y - this.canvas.height/2;
                    this.player.targetAngle = Math.atan2(worldMouseY - this.player.segments[0].y, worldMouseX - this.player.segments[0].x);
                }

                this.updateSnakePhysics(this.player, dt, this.isBoosting);

                this.bots.forEach(bot => {
                    bot.botTargetTimer -= dt;
                    if(bot.botTargetTimer <= 0) {
                        bot.botTargetTimer = 1 + Math.random() * 2;
                        let closestFood = null, minDist = 300;
                        this.foods.forEach(f => {
                            let d = Math.sqrt((f.x - bot.segments[0].x)**2 + (f.y - bot.segments[0].y)**2);
                            if(d < minDist) { minDist = d; closestFood = f; }
                        });
                        if(closestFood) {
                            bot.targetAngle = Math.atan2(closestFood.y - bot.segments[0].y, closestFood.x - bot.segments[0].x);
                        } else {
                            bot.targetAngle += (Math.random() - 0.5) * 2;
                        }
                    }
                    this.updateSnakePhysics(bot, dt, false);
                });

                this.handleFoodEating(this.player);
                this.bots.forEach(bot => this.handleFoodEating(bot));

                this.checkCollisions();

                this.camera.x = this.player.segments[0].x;
                this.camera.y = this.player.segments[0].y;
                let targetZoom = Math.max(0.5, 1 - (this.player.score * 0.0015));
                this.camera.zoom += (targetZoom - this.camera.zoom) * 0.05;

                if(this.foods.length < 250) this.spawnInitialFoods(50);
            },

            updateSnakePhysics(snake, dt, boostActive) {
                let diff = snake.targetAngle - snake.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                snake.angle += diff * 8 * dt;

                if(boostActive && snake.score > 10) {
                    snake.speed = CONFIG.boostSpeed;
                    if(Math.random() < 0.1) {
                        snake.score--;
                        snake.segments.pop();
                        let tail = snake.segments[snake.segments.length - 1];
                        if(tail) Game.foods.push(Game.createFood(tail.x + (Math.random()-0.5)*15, tail.y + (Math.random()-0.5)*15, 2));
                    }
                } else {
                    snake.speed = CONFIG.baseSpeed;
                }

                let head = snake.segments[0];
                let nextX = head.x + Math.cos(snake.angle) * snake.speed * dt;
                let nextY = head.y + Math.sin(snake.angle) * snake.speed * dt;

                if(nextX < 0) nextX = 0; if(nextX > CONFIG.worldWidth) nextX = CONFIG.worldWidth;
                if(nextY < 0) nextY = 0; if(nextY > CONFIG.worldHeight) nextY = CONFIG.worldHeight;

                let prevX = head.x, prevY = head.y;
                head.x = nextX; head.y = nextY;

                for(let i = 1; i < snake.segments.length; i++) {
                    let seg = snake.segments[i];
                    let dx = prevX - seg.x;
                    let dy = prevY - seg.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);

                    if(dist > CONFIG.segmentSpacing) {
                        let ratio = CONFIG.segmentSpacing / dist;
                        seg.x = prevX - dx * ratio;
                        seg.y = prevY - dy * ratio;
                    }
                    prevX = seg.x; prevY = seg.y;
                }

                snake.thickness = Math.min(22, 9 + (snake.score * 0.05));
            },

            handleFoodEating(snake) {
                let head = snake.segments[0];
                for(let i = this.foods.length - 1; i >= 0; i--) {
                    let f = this.foods[i];
                    let d = Math.sqrt((head.x - f.x)**2 + (head.y - f.y)**2);
                    if(d < snake.thickness + f.r) {
                        this.foods.splice(i, 1);
                        snake.score += Math.floor(f.r);
                        
                        let tail = snake.segments[snake.segments.length - 1];
                        snake.segments.push({ x: tail.x, y: tail.y });

                        if(!snake.isBot) {
                            AudioFX.playEat();
                            this.updateUI();
                        }
                    }
                }
            },

            checkCollisions() {
                let allSnakes = [this.player, ...this.bots];

                allSnakes.forEach(src => {
                    if(!src || src.dead) return;
                    let head = src.segments[0];

                    allSnakes.forEach(target => {
                        if(!target || src === target || target.dead) return;

                        for(let i = 0; i < target.segments.length; i++) {
                            let seg = target.segments[i];
                            let d = Math.sqrt((head.x - seg.x)**2 + (head.y - seg.y)**2);
                            if(d < src.thickness + target.thickness * 0.7) {
                                this.killSnake(src
